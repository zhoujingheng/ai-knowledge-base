name: Daily Collect

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        id: pipeline
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Check for new articles
        id: changes
        run: |
          git add knowledge/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate JSON
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check quality
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Count articles
        if: steps.changes.outputs.has_changes == 'true'
        id: count
        run: |
          new_count=$(git diff --cached --name-only knowledge/articles/ | wc -l)
          echo "count=${new_count}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "daily collect: ${{ steps.count.outputs.count }} articles (${{ steps.count.outputs.date }})"
          git push
